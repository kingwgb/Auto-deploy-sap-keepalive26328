command:
  - /bin/sh
  - -c
  - |
    echo "[startup] starting komari-agent in background..."

    cd /tmp

    curl -fLs https://github.com/liveqte/komari-agent-webhost/releases/download/latest/pyagent.pyz -o pyagent.pyz

    python3 pyagent.pyz \
      --http-server "https://k.wgb.ccwu.cc" \
      --token "MD4pyQdKw4YeQHDuiKEClX" \
      --interval "5" \
      --log-level "1" &

    echo "[startup] komari-agent started"

    echo "[startup] starting original webapp..."
    cd /

    exec /start.sh
